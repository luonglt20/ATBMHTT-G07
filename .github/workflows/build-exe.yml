# CI/CD Build Script - Build Windows .exe from MacOS

name: Build TCPTF Windows Executable

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller frida-tools pefile colorama
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --console --name TCPTF_Scanner --hidden-import frida --hidden-import colorama --hidden-import pefile main.py
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TCPTF-Windows-Exe
        path: dist/TCPTF_Scanner.exe
